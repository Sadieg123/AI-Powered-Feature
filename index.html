<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Text Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & base ───────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;

      /* soft gradient background */
      background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 50%, #fdf4ff 100%);
    }

    /* ── Card container ─────────────────────── */
    .card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 620px;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    .header p {
      margin-top: 8px;
      font-size: 15px;
      color: #6b7280;
    }

    /* ── Textarea ───────────────────────────── */
    textarea {
      width: 100%;
      height: 140px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #1a1a2e;
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    textarea:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.15);
      background: #fff;
    }

    textarea::placeholder { color: #9ca3af; }

    /* ── Button ─────────────────────────────── */
    button {
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
    }

    button:active:not(:disabled) { transform: translateY(0); }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    /* ── Loading dots ───────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      color: #6b7280;
      font-size: 14px;
    }

    .dots { display: flex; gap: 5px; }

    .dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #818cf8;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Result card ────────────────────────── */
    .result-card {
      margin-top: 28px;
      background: linear-gradient(135deg, #f5f3ff, #eef2ff);
      border: 1.5px solid #e0e7ff;
      border-radius: 16px;
      padding: 24px;

      /* fade + slide-up animation */
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* category badge */
    .category-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
      background: #6366f1;
      color: #fff;
    }

    .reply-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    #reply-text {
      font-size: 16px;
      line-height: 1.65;
      color: #1a1a2e;
    }

    /* blinking cursor while streaming */
    #reply-text.streaming::after {
      content: '▍';
      display: inline-block;
      animation: blink 0.8s step-end infinite;
      color: #818cf8;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Header -->
    <div class="header">
      <h1>AI Text Assistant ✨</h1>
      <p>Type anything — a question, complaint, or comment — and get an instant AI reply.</p>
    </div>

    <!-- Input -->
    <textarea id="userInput" placeholder="e.g. Your app keeps crashing every time I open it!"></textarea>

    <!-- Button -->
    <button id="analyzeBtn" onclick="analyzeText()">Analyze</button>

    <!-- Result area (empty until response arrives) -->
    <div id="result"></div>

  </div>

  <script>
    async function analyzeText() {
      const text = document.getElementById("userInput").value.trim();

      if (!text) {
        alert("Please enter some text first.");
        return;
      }

      const btn    = document.getElementById("analyzeBtn");
      const result = document.getElementById("result");

      // Disable button and show loading dots
      btn.disabled = true;
      btn.textContent = "Analyzing…";
      result.innerHTML = `
        <div class="loading">
          <div class="dots">
            <span></span><span></span><span></span>
          </div>
          Thinking…
        </div>
      `;

      // Send the request to the backend
      const response = await fetch("http://localhost:3000/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      // Build the result card — reply text starts empty and fills in via streaming
      result.innerHTML = `
        <div class="result-card">
          <div id="category-badge" class="category-badge">...</div>
          <div class="reply-label">Reply</div>
          <div id="reply-text" class="streaming"></div>
        </div>
      `;

      // Read the stream chunk by chunk
      const reader  = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const lines = decoder.decode(value).split("\n").filter(l => l.startsWith("data:"));

        for (const line of lines) {
          const parsed = JSON.parse(line.replace("data: ", ""));

          if (parsed.token) {
            // Append each token — creates the typing effect
            document.getElementById("reply-text").textContent += parsed.token;
          }

          if (parsed.done) {
            // Streaming finished — show category badge, remove cursor
            document.getElementById("category-badge").textContent = parsed.category;
            document.getElementById("reply-text").classList.remove("streaming");
          }
        }
      }

      // Re-enable the button
      btn.disabled = false;
      btn.textContent = "Analyze";
    }
  </script>

</body>
</html>
